<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project status</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ground: #0E1626; --ground-2: #16223A;
    --paper: #F5F7FA; --surface: #FFFFFF;
    --ink: #101B2E; --muted: #7A8598; --faint: #AAB3C2;
    --line: #E3E8F0; --line-soft: #EFF2F7;
    --cyan: #16A3C9; --teal: #1BC7B3;
    --lime: #C6F24E; --lime-deep: #A8D62F;
    --grot: 'Space Grotesk', system-ui, sans-serif;
    --mono: 'Space Mono', ui-monospace, monospace;
    --body: 'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body { font-family: var(--body); color: var(--ink); background: var(--paper); line-height: 1.55; -webkit-font-smoothing: antialiased; }

  /* ===== APP FRAME: header + split panes, full viewport ===== */
  .app { height: 100dvh; display: flex; flex-direction: column; max-width: 1360px; margin: 0 auto; padding: 18px 20px 16px; }

  /* HEADER (compact) */
  .top { display: grid; grid-template-columns: 1fr auto; gap: 12px 32px; align-items: end; padding: 4px 4px 14px; flex: none; }
  .eyebrow { font-family: var(--mono); font-size: 10.5px; letter-spacing: .16em; text-transform: uppercase; color: var(--cyan); margin-bottom: 7px; display: flex; align-items: center; gap: 8px; }
  .eyebrow .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--teal); box-shadow: 0 0 0 0 rgba(27,199,179,.6); animation: beacon 2.4s ease-out infinite; flex: none; }
  @keyframes beacon { 0% { box-shadow: 0 0 0 0 rgba(27,199,179,.55);} 100% { box-shadow: 0 0 0 9px rgba(27,199,179,0);} }
  h1 { font-family: var(--grot); font-weight: 700; font-size: clamp(22px, 3.2vw, 34px); line-height: 1; letter-spacing: -.02em; }
  h1 .sub { display: block; font-size: .42em; font-weight: 500; color: var(--muted); margin-top: 5px; }
  .headline-metric { text-align: right; }
  .headline-metric .pct { font-family: var(--grot); font-weight: 700; letter-spacing: -.03em; font-size: clamp(30px, 4.4vw, 48px); line-height: .9; background: linear-gradient(120deg, var(--cyan), var(--teal)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .headline-metric .pct small { font-size: .38em; -webkit-text-fill-color: var(--faint); }
  .headline-metric .stamp { font-family: var(--mono); font-size: 10.5px; color: var(--muted); margin-top: 5px; }
  .headline-metric .stamp b { color: var(--ink); font-weight: 700; }

  /* MOBILE TABS (hidden on desktop) */
  .tabbar { display: none; flex: none; gap: 6px; padding: 0 0 10px; }
  .tabbar button { flex: 1; font-family: var(--grot); font-weight: 600; font-size: 13px; padding: 9px 12px; border-radius: 10px; border: 1px solid var(--line); background: var(--surface); color: var(--muted); cursor: pointer; }
  .tabbar button.on { background: var(--ground); color: #EAF0F8; border-color: var(--ground); }

  /* SPLIT */
  .split { flex: 1; min-height: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .pane { min-height: 0; overflow-y: auto; overscroll-behavior: contain; scrollbar-width: thin; padding: 2px 2px 8px; }

  .panel { background: var(--surface); border: 1px solid var(--line); border-radius: 16px; box-shadow: 0 1px 2px rgba(16,27,46,.04), 0 8px 24px -18px rgba(16,27,46,.25); }
  .panel + .panel { margin-top: 16px; }
  .panel-head { padding: 15px 20px 12px; border-bottom: 1px solid var(--line-soft); display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
  .panel-head h2 { font-family: var(--grot); font-weight: 600; font-size: 14.5px; }
  .panel-head .meta { font-family: var(--mono); font-size: 10px; color: var(--muted); }

  /* ===== LEFT PANE: milestones ===== */
  .stack-panel { padding: 18px 18px 22px; }
  .zone-label { font-family: var(--mono); font-size: 9.5px; letter-spacing: .13em; text-transform: uppercase; color: var(--muted); margin: 2px 2px 11px; display: flex; flex-wrap: wrap; align-items: baseline; gap: 6px; }
  .zone-label b { color: var(--ink); }
  .zone-label.rem b { color: var(--lime-deep); }

  .rem-grid { display: grid; grid-template-columns: 1fr; gap: 9px; margin-bottom: 20px; }
  @media (min-width: 1180px) { .rem-grid { grid-template-columns: 1fr 1fr; } }
  .rcard { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 11px 13px; cursor: pointer; transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease; outline: none; }
  .rcard:hover, .rcard:focus-visible, .rcard.open { transform: translateY(-2px); box-shadow: 0 12px 26px -14px rgba(16,27,46,.4); border-color: var(--teal); }
  .rcard .r-top { display: flex; align-items: center; gap: 8px; }
  .rcard .r-seq { font-family: var(--mono); font-size: 10px; color: var(--faint); flex: none; }
  .rcard .r-name { font-family: var(--grot); font-weight: 600; font-size: 13px; flex: 1; min-width: 0; }
  .rcard .r-status { font-family: var(--mono); font-size: 9px; letter-spacing: .04em; text-transform: uppercase; padding: 2px 7px; border-radius: 20px; flex: none; white-space: nowrap; }
  .rcard.active .r-status { background: rgba(168,214,47,.18); color: var(--lime-deep); }
  .rcard.pending .r-status { background: var(--line-soft); color: var(--muted); }
  .rcard .r-fillbar { height: 4px; border-radius: 4px; background: var(--line-soft); margin-top: 8px; overflow: hidden; }
  .rcard .r-fillbar span { display: block; height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--lime-deep), var(--lime)); position: relative; }
  .rcard.active .r-fillbar span::after { content: ""; position: absolute; right: 0; top: 50%; transform: translateY(-50%); width: 7px; height: 7px; border-radius: 50%; background: var(--lime); box-shadow: 0 0 0 0 rgba(198,242,78,.7); animation: beacon 2s ease-out infinite; }
  .rcard .r-detail { max-height: 0; opacity: 0; overflow: hidden; transition: max-height .28s ease, opacity .2s ease, margin .28s ease; }
  .rcard:hover .r-detail, .rcard:focus-visible .r-detail, .rcard.open .r-detail { max-height: 340px; opacity: 1; margin-top: 10px; }
  .rcard .r-note { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-bottom: 8px; }
  .rcard .r-steps { list-style: none; display: flex; flex-direction: column; gap: 5px; }
  .rcard .r-steps li { display: flex; gap: 8px; align-items: baseline; font-size: 12px; color: #33415C; }
  .rcard .r-steps .dot { flex: none; width: 6px; height: 6px; border-radius: 50%; background: var(--faint); transform: translateY(3px); }
  .rcard .r-steps li.done .dot { background: var(--teal); }
  .rcard .r-steps li.done { color: var(--muted); text-decoration: line-through; text-decoration-color: rgba(27,199,179,.5); }
  .rcard .r-share { font-family: var(--mono); font-size: 9.5px; color: var(--faint); margin-top: 8px; }

  .waterline { display: flex; align-items: center; gap: 12px; margin: 2px 0 16px; }
  .waterline .wl-line { flex: 1; border-top: 2px dashed var(--teal); }
  .waterline .wl-tag { font-family: var(--mono); font-size: 9.5px; letter-spacing: .1em; text-transform: uppercase; color: var(--teal); white-space: nowrap; }

  .phase-head { grid-column: 1 / -1; font-family: var(--mono); font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin: 9px 2px 0; display: flex; align-items: center; gap: 10px; }
  .phase-head::after { content: ""; flex: 1; border-top: 1px solid var(--line-soft); }
  .wall { display: grid; grid-template-columns: repeat(auto-fill, minmax(185px, 1fr)); gap: 6px; }
  .brick { background: linear-gradient(100deg, var(--ground), var(--ground-2)); border: 1px solid rgba(255,255,255,.05); border-radius: 8px; padding: 7px 10px; min-height: 32px; cursor: pointer; display: flex; align-items: center; gap: 7px; outline: none; transition: transform .14s ease, box-shadow .14s ease, border-color .14s ease; }
  .brick:hover, .brick:focus-visible, .brick.lit { transform: translateY(-2px); border-color: rgba(27,199,179,.55); box-shadow: 0 10px 24px -12px rgba(14,22,38,.7); }
  .brick .b-name { font-family: var(--grot); font-weight: 500; font-size: 11.5px; color: #E7ECF4; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .brick .b-tick { color: var(--teal); font-family: var(--mono); font-size: 10px; flex: none; }
  .brick .b-badge { font-family: var(--mono); font-size: 7.5px; letter-spacing: .05em; text-transform: uppercase; color: var(--ground); background: var(--teal); padding: 1px 5px; border-radius: 20px; flex: none; }

  .glegend { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--line-soft); }
  .glegend .item { display: flex; align-items: center; gap: 7px; font-family: var(--mono); font-size: 9.5px; color: var(--muted); }
  .glegend .sw { width: 12px; height: 12px; border-radius: 4px; flex: none; }
  .glegend .sw.done { background: linear-gradient(100deg, var(--ground), var(--ground-2)); }
  .glegend .sw.active { background: var(--lime); }
  .glegend .sw.pending { background: var(--surface); border: 1.5px solid var(--line); }

  .footnote { margin: 14px 4px 4px; font-size: 11px; color: var(--muted); line-height: 1.6; }
  .footnote b { color: var(--ink); font-weight: 600; }

  /* ===== RIGHT PANE: updates ===== */
  .history-body { padding: 14px 20px 18px; }
  .spark { width: 100%; height: 84px; display: block; }
  .spark-cap { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 7px; }
  .report { padding: 14px 20px; border-bottom: 1px solid var(--line-soft); }
  .report:last-child { border-bottom: none; }
  .report-head { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; margin-bottom: 7px; }
  .report-date { font-family: var(--mono); font-size: 12px; font-weight: 700; }
  .report-tag { font-family: var(--mono); font-size: 9px; letter-spacing: .06em; text-transform: uppercase; background: rgba(27,199,179,.14); color: #0E8F7F; padding: 2px 7px; border-radius: 20px; margin-left: 7px; }
  .report-pct { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .report-pct .delta { color: var(--lime-deep); margin-left: 6px; font-weight: 700; }
  .report ul { list-style: none; }
  .report li { font-size: 12.5px; padding: 2px 0 2px 15px; position: relative; color: #2C3A54; }
  .report li::before { content: ""; position: absolute; left: 0; top: .72em; width: 7px; height: 2px; background: var(--cyan); border-radius: 2px; }
  .empty { padding: 20px; font-size: 13px; color: var(--muted); font-style: italic; }

  /* POPOVER */
  .pop { position: fixed; z-index: 50; width: 300px; max-width: calc(100vw - 24px); background: var(--ground); border: 1px solid rgba(27,199,179,.35); border-radius: 12px; padding: 13px 15px; box-shadow: 0 24px 50px -18px rgba(14,22,38,.75); opacity: 0; pointer-events: none; transition: opacity .14s ease; }
  .pop.show { opacity: 1; }
  .pop .p-title { font-family: var(--grot); font-weight: 600; font-size: 13px; color: #F2F6FB; display: flex; align-items: center; gap: 8px; }
  .pop .p-note { font-family: var(--mono); font-size: 10px; color: var(--teal); margin-top: 5px; }
  .pop .p-steps { list-style: none; margin-top: 9px; display: flex; flex-direction: column; gap: 4px; }
  .pop .p-steps li { display: flex; gap: 8px; align-items: baseline; font-size: 11.5px; line-height: 1.45; color: #B9C4D8; }
  .pop .p-steps .dot { flex: none; width: 5px; height: 5px; border-radius: 50%; background: var(--teal); transform: translateY(1px); }
  .pop .p-share { font-family: var(--mono); font-size: 9.5px; color: rgba(185,196,216,.55); margin-top: 9px; }

  /* ===== MOBILE ===== */
  @media (max-width: 820px) {
    .app { height: 100dvh; padding: 12px 12px 10px; }
    .top { grid-template-columns: 1fr auto; padding-bottom: 10px; }
    h1 .sub { display: none; }
    .tabbar { display: flex; }
    .split { grid-template-columns: 1fr; }
    .pane { display: none; }
    .pane.show { display: block; }
    .wall { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    .rem-grid { grid-template-columns: 1fr; }
    .headline-metric .stamp { font-size: 9.5px; }
  }
  @media (prefers-reduced-motion: reduce) { .live-dot, .rcard.active .r-fillbar span::after { animation: none; } }
</style>
</head>
<body>
<div class="app">

  <div class="top">
    <div>
      <div class="eyebrow"><span class="live-dot"></span><span id="eyebrow">Project status</span></div>
      <h1 id="title"></h1>
    </div>
    <div class="headline-metric">
      <div class="pct"><span id="pct"></span><small>%</small></div>
      <div class="stamp">Updated <b id="updated"></b></div>
    </div>
  </div>

  <div class="tabbar">
    <button data-pane="L" class="on">Milestones</button>
    <button data-pane="R">Updates</button>
  </div>

  <div class="split">
    <!-- LEFT: milestones -->
    <div class="pane show" id="paneL">
      <section class="panel stack-panel">
        <div class="zone-label rem"><b id="remLabel">Remaining work</b><span>· each block = 1% · hover / tap for detail</span></div>
        <div class="rem-grid" id="remGrid"></div>
        <div class="waterline"><span class="wl-tag" id="wlTag">90% delivered</span><span class="wl-line"></span></div>
        <div class="zone-label"><b id="delLabel">Delivered</b><span>· every brick = 1% of the project, already built</span></div>
        <div class="wall" id="wall"></div>
        <div class="glegend">
          <div class="item"><span class="sw done"></span>Delivered brick — 1%</div>
          <div class="item"><span class="sw active"></span>In progress</div>
          <div class="item"><span class="sw pending"></span>Upcoming</div>
        </div>
      </section>
      <div class="footnote" id="footnote"></div>
    </div>

    <!-- RIGHT: updates -->
    <div class="pane" id="paneR">
      <section class="panel">
        <div class="panel-head"><h2>Progress over time</h2><span class="meta" id="histMeta"></span></div>
        <div class="history-body">
          <svg class="spark" id="spark" viewBox="0 0 600 90" preserveAspectRatio="none" aria-hidden="true"></svg>
          <div class="spark-cap">each point is a daily update</div>
        </div>
      </section>
      <section class="panel">
        <div class="panel-head"><h2>Daily reports</h2><span class="meta">newest first</span></div>
        <div id="reports"></div>
      </section>
    </div>
  </div>
</div>
<div class="pop" id="pop" role="tooltip"></div>

<!-- ============================================================
   PROJECT DATA — edit this block only.

   THE 1% RULE: every milestone has weight 1 and equals exactly
   one percent of the project. 90 delivered bricks + 10 remaining
   blocks = 100. To grow the project, add milestones — the math
   re-normalizes automatically.

   DAILY UPDATE: scroll to "updates", copy the last entry, paste
   below it (newest last). Set date, overall progress (0–100),
   notes. Headline, graph and reports update automatically.

   ADD DETAIL: add items to any "substeps" — never moves the bar.
   Only the "progress" number in the latest update does.

   Per stage: zone "delivered"|"remaining", phase (group header
   in the wall), status "done"|"active"|"pending",
   fill 0–100 (% within an active stage).
   ============================================================ -->
<script>
window.PROJECT = {
  name: "NY Bottling ERP",

  stages: [
    { title: "System & architecture blueprint", phase: "Design & specification", zone: "delivered", weight: 1, status: "done",
      substeps: [ { t: "Full written system overview" }, { t: "Design principles & constraints documented" }, { t: "Clean architecture: API / Application / Domain / Infrastructure" }, { t: "Strict layer boundaries & dependency rules" }, { t: "Module map across the whole platform" }, { t: "Technology choices justified & recorded" }, { t: "Server / client responsibility split defined" } ] },
    { title: "Data-model specification", phase: "Design & specification", zone: "delivered", weight: 1, status: "done",
      substeps: [ { t: "Every entity specified before any code" }, { t: "Relationships & ownership rules" }, { t: "Lifecycle rules per entity (draft → posted → closed)" }, { t: "All money stored in cents — no floating point" }, { t: "Naming & typing conventions" }, { t: "ID strategy defined (UUID v7)" }, { t: "Soft-delete & retention decisions" } ] },
    { title: "Feature & UI specifications", phase: "Design & specification", zone: "delivered", weight: 1, status: "done",
      substeps: [ { t: "Feature spec for every module" }, { t: "Order, payment & return flows step-by-step" }, { t: "UI page specifications for all apps" }, { t: "Screen-by-screen field definitions" }, { t: "Role-based visibility rules per page" }, { t: "Edge cases & error states written down" }, { t: "Acceptance criteria per feature" } ] },
    { title: "Offline-first architecture models", phase: "Design & specification", zone: "delivered", weight: 1, status: "done",
      substeps: [ { t: "Offline client architecture designed up-front" }, { t: "Sync strategy: deltas, queues, retries" }, { t: "Conflict-handling strategy on paper first" }, { t: "Device storage & recovery design" }, { t: "Temp-ID → real-ID promotion scheme" }, { t: "Which data lives on device vs server" }, { t: "Battery & bandwidth considerations" } ] },
    { title: "Dev instructions & traceability", phase: "Design & specification", zone: "delivered", weight: 1, status: "done",
      substeps: [ { t: "Developer instructions & conventions" }, { t: "Code style & review rules" }, { t: "Folder & naming standards" }, { t: "Traceability matrix: every spec linked to code" }, { t: "Definition of done per work item" }, { t: "Branching & commit conventions" }, { t: "How-to guides for common tasks" } ] },
    { title: "Chart of accounts & posting rules", phase: "Design & specification", zone: "delivered", weight: 1, status: "done",
      substeps: [ { t: "Ledger account structure designed" }, { t: "Account codes fixed in the domain (AccountCodes)" }, { t: "Double-entry posting rules for every business event" }, { t: "Order → invoice → payment → return flows mapped" }, { t: "Deposit & expense accounts included" }, { t: "Journal entry & line types defined" }, { t: "Weekly posting cycle designed" } ] },
    { title: "AR, credit & cash accounting design", phase: "Design & specification", zone: "delivered", weight: 1, status: "done",
      substeps: [ { t: "Customer AR sub-ledger design" }, { t: "Account credit rules & application order" }, { t: "Order credit policies per customer" }, { t: "Over-credit detection rules" }, { t: "Salesperson cash & handover accounting" }, { t: "Handover status lifecycle" }, { t: "Expense categories defined" } ] },
    { title: "Reconciliation & checkpoint design", phase: "Design & specification", zone: "delivered", weight: 1, status: "done",
      substeps: [ { t: "Checkpoint strategy for instant balances" }, { t: "When checkpoints are cut & rebuilt" }, { t: "Reconciliation pass design" }, { t: "Drift detection & tolerance rules" }, { t: "Repair path when drift is found" }, { t: "Balance-read performance targets" }, { t: "Audit trail of reconciliation runs" } ] },
    { title: "Sales entities", phase: "Domain & database", zone: "delivered", weight: 1, status: "done",
      substeps: [ { t: "Customers with statuses & types" }, { t: "Multiple addresses per customer" }, { t: "Orders & order lines" }, { t: "Order kinds & status lifecycle" }, { t: "Back-order policies per customer" }, { t: "Invoices & invoice lines" }, { t: "Returns & return lines with types" } ] },
    { title: "Money & ledger entities", phase: "Domain & database", zone: "delivered", weight: 1, status: "done",
      substeps: [ { t: "Payments with methods & statuses" }, { t: "Payment allocations across invoices" }, { t: "Payment links & saved payment methods" }, { t: "Journal entries & journal lines" }, { t: "Ledger accounts & checkpoints" }, { t: "Expenses with categories" }, { t: "Cash handovers with status tracking" } ] },
    { title: "Beverage catalog entities", phase: "Domain & database", zone: "delivered", weight: 1, status: "done",
      substeps: [ { t: "Products with categories & subcategories" }, { t: "Bottle sizes & flavors" }, { t: "Per-case deposit fields on products" }, { t: "Category-level deposit defaults" }, { t: "Stock status tracking" }, { t: "Sellable flags" }, { t: "Customer favorites" } ] },
    { title: "Logistics entities", phase: "Domain & database", zone: "delivered", weight: 1, status: "done",
      substeps: [ { t: "Routes & route templates" }, { t: "Delivery stops with statuses" }, { t: "Geofences for locations" }, { t: "Truck types with loading types" }, { t: "Pick lists & pick list items" }, { t: "Pallet plans & pallet items" }, { t: "Packing modes & damage types" } ] },
    { title: "System entities", phase: "Domain & database", zone: "delivered", weight: 1, status: "done",
      substeps: [ { t: "Tasks with priorities, statuses & tags" }, { t: "Saved list views per user" }, { t: "Notifications & per-user preferences" }, { t: "Notification & document templates" }, { t: "Template fields, sections & messages" }, { t: "Audit log entries" }, { t: "Idempotency records & refresh tokens" } ] },
    { title: "Relational schema & 31 migrations", phase: "Domain & database", zone: "delivered", weight: 1, status: "done",
      substeps: [ { t: "Complete schema across all 62 entities" }, { t: "31 versioned, replayable migrations" }, { t: "Forward-only migration discipline" }, { t: "Schema evolves without data loss" }, { t: "Migration verification scripts" }, { t: "Pending-migration inspection tooling" }, { t: "Same schema mirrored on-device" } ] },
    { title: "Indexes, constraints & sequences", phase: "Domain & database", zone: "delivered", weight: 1, status: "done",
      substeps: [ { t: "Indexes tuned for lists, filters & sync" }, { t: "Foreign keys on every relationship" }, { t: "Integrity constraints via dedicated SQL" }, { t: "Unique constraints on business keys" }, { t: "Gapless document numbering sequences" }, { t: "Per-document-type sequence counters" }, { t: "Integrity preflight checks before deploys" } ] },
    { title: "Authentication & credentials", phase: "Security core", zone: "delivered", weight: 1, status: "done",
      substeps: [ { t: "JWT access + refresh token flow" }, { t: "Refresh token rotation & revocation" }, { t: "Bcrypt password hashing" }, { t: "Secure credential storage" }, { t: "Login for every app (Office, Field, Warehouse)" }, { t: "Session expiry handling" }, { t: "Auth middleware on every protected route" } ] },
    { title: "Roles & permissions", phase: "Security core", zone: "delivered", weight: 1, status: "done",

<script>
(function () {
  const P = window.PROJECT;
  if (!P) { document.body.innerHTML = '<p style="padding:40px;font-family:monospace">data missing</p>'; return; }

  const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const fmtDate = s => { const [y,m,d] = s.split("-").map(Number); return d+" "+MONTHS[m-1]+" "+y; };
  const fmtP = n => (Math.round(n * 10) / 10).toString();
  const LABEL = { done: "Delivered", active: "In progress", pending: "Upcoming" };

  document.getElementById("eyebrow").textContent = "Project status";
  document.getElementById("title").innerHTML = P.name + '<span class="sub">Wholesale beverage platform · accounting, billing &amp; distribution</span>';
  document.title = P.name + " — project status";

  const stages = P.stages;
  const totalW = stages.reduce((s, m) => s + (m.weight || 0), 0) || 1;
  const delivered = stages.filter(s => s.zone === "delivered");
  const remaining = stages.filter(s => s.zone !== "delivered");
  const delTrueW = delivered.reduce((s, m) => s + (m.weight || 0), 0) / totalW * 100;

  const updates = [...(P.updates || [])].sort((a, b) => a.date < b.date ? -1 : 1);
  const latest = updates[updates.length - 1];
  let progress = latest ? latest.progress
    : stages.reduce((s, m) => s + (m.weight/totalW*100) * (m.status==="done"?100:(m.fill||0))/100, 0);
  progress = Math.max(0, Math.min(100, progress));
  document.getElementById("pct").textContent = fmtP(progress);
  document.getElementById("updated").textContent = latest ? fmtDate(latest.date) : "—";
  document.getElementById("wlTag").textContent = fmtP(delTrueW) + "% delivered — " + delivered.length + " bricks";
  document.getElementById("remLabel").textContent = "Remaining work — " + remaining.length + " blocks";
  document.getElementById("delLabel").textContent = "Delivered — " + delivered.length + " milestones";

  /* ---- REMAINING CARDS ---- */
  const remGrid = document.getElementById("remGrid");
  remaining.forEach((m, i) => {
    const card = document.createElement("div");
    card.className = "rcard " + (m.status || "pending");
    card.tabIndex = 0;
    const steps = (m.substeps && m.substeps.length)
      ? '<ul class="r-steps">' + m.substeps.map(s => '<li class="' + (s.done ? "done" : "") + '"><span class="dot"></span><span>' + s.t + '</span></li>').join("") + '</ul>'
      : '<div class="r-note" style="font-style:italic">Detailed steps added as this stage is planned.</div>';
    card.innerHTML =
      '<div class="r-top">' +
        '<span class="r-seq">' + String(i + 1).padStart(2, "0") + '</span>' +
        '<span class="r-name">' + m.title + '</span>' +
        '<span class="r-status">' + (LABEL[m.status] || "Upcoming") +
          (m.status === "active" && m.fill ? " " + fmtP(m.fill) + "%" : "") + '</span>' +
      '</div>' +
      (m.status === "active" && m.fill ? '<div class="r-fillbar"><span style="width:' + m.fill + '%"></span></div>' : '') +
      '<div class="r-detail">' +
        (m.note ? '<div class="r-note">' + m.note + '</div>' : '') + steps +
        '<div class="r-share">1% of project</div>' +
      '</div>';
    card.addEventListener("click", () => card.classList.toggle("open"));
    remGrid.appendChild(card);
  });

  /* ---- BRICK WALL + POPOVER ---- */
  const wall = document.getElementById("wall");
  const pop = document.getElementById("pop");
  let lit = null, hideTimer = null;

  function showPop(brick, m) {
    clearTimeout(hideTimer);
    if (lit) lit.classList.remove("lit");
    lit = brick; brick.classList.add("lit");
    pop.innerHTML =
      '<div class="p-title">' + m.title + (m.badge ? '<span class="b-badge">' + m.badge + '</span>' : '') + '</div>' +
      (m.note ? '<div class="p-note">' + m.note + '</div>' : '') +
      ((m.substeps && m.substeps.length)
        ? '<ul class="p-steps">' + m.substeps.map(s => '<li><span class="dot"></span><span>' + s.t + '</span></li>').join("") + '</ul>' : '') +
      '<div class="p-share">1% of project · delivered</div>';
    const r = brick.getBoundingClientRect();
    pop.classList.add("show");
    const pw = pop.offsetWidth, ph = pop.offsetHeight;
    let x = r.right + 10;
    if (x + pw > window.innerWidth - 12) x = r.left - pw - 10;
    if (x < 12) x = Math.min(Math.max(12, r.left), window.innerWidth - pw - 12);
    let y = r.top + r.height / 2 - ph / 2;
    y = Math.max(12, Math.min(y, window.innerHeight - ph - 12));
    pop.style.left = x + "px"; pop.style.top = y + "px";
  }
  function hidePop() {
    hideTimer = setTimeout(() => {
      pop.classList.remove("show");
      if (lit) { lit.classList.remove("lit"); lit = null; }
    }, 120);
  }

  let lastPhase = null;
  delivered.forEach(m => {
    if (m.phase && m.phase !== lastPhase) {
      lastPhase = m.phase;
      const ph = document.createElement("div");
      ph.className = "phase-head"; ph.textContent = m.phase;
      wall.appendChild(ph);
    }
    const brick = document.createElement("div");
    brick.className = "brick"; brick.tabIndex = 0;
    brick.innerHTML = '<span class="b-name">' + m.title + '</span>' +
      (m.badge ? '<span class="b-badge">' + m.badge + '</span>' : '<span class="b-tick">✓</span>');
    brick.__m = m;
    brick.addEventListener("mouseenter", () => showPop(brick, m));
    brick.addEventListener("mouseleave", hidePop);
    brick.addEventListener("focus", () => showPop(brick, m));
    brick.addEventListener("blur", hidePop);
    brick.addEventListener("click", e => { e.stopPropagation(); showPop(brick, m); });
    wall.appendChild(brick);
  });
  document.addEventListener("click", e => { if (!e.target.closest(".brick")) hidePop(); });
  document.addEventListener("scroll", () => {
    if (lit && lit.matches(":hover")) { showPop(lit, lit.__m); }
    else { pop.classList.remove("show"); if (lit) { lit.classList.remove("lit"); lit = null; } }
  }, { passive: true, capture: true });

  /* mobile tab switcher */
  const tabs = document.querySelectorAll(".tabbar button");
  tabs.forEach(btn => btn.addEventListener("click", () => {
    tabs.forEach(b => b.classList.toggle("on", b === btn));
    document.getElementById("paneL").classList.toggle("show", btn.dataset.pane === "L");
    document.getElementById("paneR").classList.toggle("show", btn.dataset.pane === "R");
  }));

  /* ---- SPARKLINE ---- */
  const spark = document.getElementById("spark");
  const W = 600, H = 90, pad = 10;
  const pts = updates.map(u => u.progress), dates = updates.map(u => u.date);
  document.getElementById("histMeta").textContent = updates.length + (updates.length === 1 ? " update" : " updates");
  if (pts.length) {
    const lo = Math.min(...pts, progress) - 3, hi = Math.max(...pts, progress) + 3, sp = Math.max(hi - lo, 1);
    const x = i => pad + (pts.length === 1 ? (W - pad*2) : i/(pts.length-1)*(W - pad*2));
    const y = v => H - pad - (v - lo)/sp*(H - pad*2);
    let path = ""; pts.forEach((v,i) => path += (i?"L":"M") + x(i) + " " + y(v) + " ");
    const area = path + "L" + x(pts.length-1) + " " + (H-pad) + " L" + x(0) + " " + (H-pad) + " Z";
    let dots = ""; pts.forEach((v,i) => dots += '<circle cx="'+x(i)+'" cy="'+y(v)+'" r="3.5" fill="#16A3C9"><title>'+fmtDate(dates[i])+' · '+fmtP(v)+'%</title></circle>');
    spark.innerHTML =
      '<defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1BC7B3" stop-opacity="0.28"/><stop offset="100%" stop-color="#1BC7B3" stop-opacity="0"/></linearGradient></defs>' +
      '<path d="'+area+'" fill="url(#sg)"/>' +
      '<path d="'+path+'" fill="none" stroke="#16A3C9" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>' + dots;
  } else {
    spark.innerHTML = '<text x="300" y="48" text-anchor="middle" fill="#AAB3C2" font-family="Space Mono" font-size="12">no updates yet</text>';
  }

  /* ---- REPORTS ---- */
  const repWrap = document.getElementById("reports");
  if (!updates.length) { repWrap.innerHTML = '<p class="empty">No updates posted yet.</p>'; }
  else {
    [...updates].reverse().forEach((u, idx) => {
      const origIdx = updates.length - 1 - idx;
      const prev = origIdx > 0 ? updates[origIdx - 1].progress : null;
      const delta = prev !== null ? u.progress - prev : null;
      const isLatest = origIdx === updates.length - 1;
      const art = document.createElement("article"); art.className = "report";
      art.innerHTML =
        '<div class="report-head">' +
          '<span class="report-date">' + fmtDate(u.date) + (isLatest ? '<span class="report-tag">latest</span>' : '') + '</span>' +
          '<span class="report-pct">' + fmtP(u.progress) + "%" +
            (delta !== null && delta !== 0 ? '<span class="delta">' + (delta > 0 ? "+" : "") + fmtP(delta) + '</span>' : '') + '</span>' +
        '</div>' +
        '<ul>' + (u.notes || []).map(n => '<li>' + n + '</li>').join("") + '</ul>';
      repWrap.appendChild(art);
    });
  }

  document.getElementById("footnote").innerHTML =
    'Every milestone on this page equals exactly <b>1% of the project</b>: ' + delivered.length +
    ' delivered bricks below the waterline, ' + remaining.length + ' remaining blocks above it. ' +
    'Hover or tap any brick for what went into it. Adding detail inside a milestone never moves the headline — only daily updates do.';
})();
</script>
